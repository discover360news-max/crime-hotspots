name: Build and Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger from GitHub UI
  schedule:
    - cron: '0 6 * * *'  # Runs daily at 6 AM UTC (2 AM Trinidad time)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'astro-poc/package-lock.json'

      - name: Install dependencies
        working-directory: astro-poc
        run: npm ci

      - name: Build Astro site
        working-directory: astro-poc
        env:
          PUBLIC_SAFETY_TIPS_GAS_URL: ${{ vars.PUBLIC_SAFETY_TIPS_GAS_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Workers
        working-directory: astro-poc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Ping Google Sitemaps
        run: |
          echo "Waiting 30s for Workers deployment to propagate..."
          sleep 30
          echo "Pinging Google sitemap index..."
          curl -s "https://www.google.com/ping?sitemap=https://crimehotspots.com/sitemap-index.xml" -o /dev/null -w "sitemap-index: %{http_code}\n"
          echo "Pinging Google news sitemap..."
          curl -s "https://www.google.com/ping?sitemap=https://crimehotspots.com/news-sitemap.xml" -o /dev/null -w "news-sitemap: %{http_code}\n"
          echo "✅ Google notified"
